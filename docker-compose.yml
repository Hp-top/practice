version: '3.8'

services:
  backend:
    build: ./backend
    container_name: hp-top-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - db_data:/app/instance
    environment:
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    networks:
      - hp-top-network

  frontend:
    build: ./frontend
    container_name: hp-top-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - hp-top-network
    depends_on:
      - backend

volumes:
  db_data:

networks:
  hp-top-network:
    driver: bridge