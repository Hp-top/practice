<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hp-top — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2fa; --white: #ffffff;
      --purple: #7c5fcb; --purple2: #a06fdd;
      --pink: #e072a4; --pink2: #f09ac0;
      --blue: #5b8dee; --blue2: #93b4f5;
      --text: #1e1535; --muted: #9b94ae; --border: #e8e3f5;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

    /* TOPBAR */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 58px; background: var(--white); border-bottom: 1px solid var(--border); box-shadow: 0 2px 12px rgba(120,80,180,0.05); flex-shrink: 0; z-index: 50; }
    .logo { font-size: 20px; font-weight: 800; background: linear-gradient(90deg,var(--purple),var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.5px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .tb-icon { width: 34px; height: 34px; border-radius: 10px; background: #f5f3ff; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 15px; transition: box-shadow .15s, color .15s; }
    .tb-icon:hover { box-shadow: 0 2px 10px rgba(120,80,180,0.13); color: var(--purple); }
    .search-wrap { display: flex; align-items: center; gap: 7px; background: #f5f3ff; border: 1px solid var(--border); border-radius: 10px; padding: 7px 13px; width: 180px; transition: box-shadow .15s, border-color .15s; }
    .search-wrap:focus-within { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,95,203,0.1); }
    .search-wrap input { border: none; outline: none; background: transparent; font-size: 12px; font-family: inherit; color: var(--text); width: 100%; }
    .search-wrap input::placeholder { color: var(--muted); }
    .btn-login { display: flex; align-items: center; gap: 7px; background: linear-gradient(90deg,var(--purple),var(--purple2)); color: #fff; border: none; border-radius: 50px; padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .2s, transform .1s, box-shadow .2s; box-shadow: 0 4px 14px rgba(124,95,203,0.25); }
    .btn-login:hover { opacity: .9; box-shadow: 0 6px 20px rgba(124,95,203,0.35); }
    .btn-login:active { transform: scale(.97); }

    /* MAIN */
    .main { flex: 1; overflow-y: auto; padding: 28px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .page-title { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 22px; }

    /* PROJECT CARDS */
    .projects-row { display: flex; gap: 16px; margin-bottom: 30px; flex-wrap: wrap; align-items: flex-end; }
    .project-card {
      background: var(--white); border-radius: 20px; padding: 52px 20px 18px;
      width: 195px; border: 1px solid var(--border);
      box-shadow: 0 2px 14px rgba(120,80,180,0.07);
      position: relative; cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      display: flex; flex-direction: column; justify-content: flex-end;
      margin-top: 20px;
    }
    .project-card:hover { transform: translateY(-4px); box-shadow: 0 10px 32px rgba(120,80,180,0.14); }
    .proj-icon { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 6px 18px rgba(0,0,0,0.14); }

    /* project delete button — top-right */
    .proj-del {
      position: absolute; top: 10px; right: 10px;
      width: 24px; height: 24px; border-radius: 7px;
      border: none; background: transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; cursor: pointer; color: var(--muted);
      transition: background .15s, color .15s;
      z-index: 2;
    }
    .proj-del:hover { background: #ffe0e8; color: #e04070; }

    .proj-avatars { display: flex; margin-bottom: 10px; }
    .pav { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--white); margin-right: -6px; font-size: 9px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .proj-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .proj-count { font-size: 11px; color: var(--muted); }
    .card-add { width: 130px; min-height: 130px; margin-top: 20px; border: 2px dashed var(--border); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--muted); cursor: pointer; transition: border-color .2s, color .2s, background .2s; }
    .card-add:hover { border-color: var(--purple); color: var(--purple); background: #f7f4ff; }

    /* TASKS TABLE */
    .table-card { background: var(--white); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 2px 14px rgba(120,80,180,0.07); overflow: hidden; }
    .table-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px 14px; border-bottom: 1px solid var(--border); }
    .table-head-title { font-size: 14px; font-weight: 600; }
    .btn-new { display: flex; align-items: center; gap: 6px; background: linear-gradient(90deg,var(--purple),var(--purple2)); color: #fff; border: none; border-radius: 10px; padding: 7px 15px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .2s, transform .1s; }
    .btn-new:hover { opacity: .88; }
    .btn-new:active { transform: scale(.97); }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; padding: 10px 22px; background: #faf9ff; border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid #f3f0fa; transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #faf8ff; }
    tbody td { padding: 12px 22px; font-size: 13px; vertical-align: middle; }
    .td-date { color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; white-space: nowrap; }
    .priority-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 7px; vertical-align: middle; }
    .task-cell { display: flex; align-items: center; gap: 10px; }
    .task-sq { width: 27px; height: 27px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .task-label { font-size: 13px; font-weight: 500; }
    .proj-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: #f0ebff; color: var(--purple); margin-left: 8px; }
    .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 6px; letter-spacing: .05em; text-transform: uppercase; }
    .b-backlog  { background: #f0ebff; color: var(--purple); }
    .b-progress { background: #ddeeff; color: #2e7de9; }
    .b-review   { background: #fff3dc; color: #c97a00; }
    .b-done     { background: #ddf7ec; color: #1a9e60; }
    .asgn-cell { display: flex; align-items: center; gap: 8px; }
    .asgn-av { width: 27px; height: 27px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .asgn-name { font-size: 13px; font-weight: 500; }
    .row-del { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 13px; border: none; background: transparent; font-family: inherit; transition: background .15s, color .15s; }
    .row-del:hover { background: #ffe0e8; color: #e04070; }

    /* OVERLAYS */
    .overlay { position: fixed; inset: 0; background: rgba(30,21,53,0.28); backdrop-filter: blur(5px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; }
    .overlay.open { opacity: 1; pointer-events: all; }

    /* CREATE MODAL */
    .modal { background: var(--white); border-radius: 24px; padding: 2rem; width: 460px; max-width: 95vw; box-shadow: 0 28px 80px rgba(120,80,180,0.18); transform: translateY(18px) scale(.97); transition: transform .3s cubic-bezier(.4,0,.2,1); }
    .overlay.open .modal { transform: none; }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 1.2rem; background: linear-gradient(90deg,var(--purple),var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .mfield { margin-bottom: .9rem; }
    .mfield label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing: .04em; text-transform: uppercase; }
    .mfield input, .mfield textarea, .mfield select { width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 9px 13px; font-size: 13px; font-family: inherit; color: var(--text); background: #fdfbff; outline: none; transition: border-color .2s, box-shadow .2s; resize: none; }
    .mfield input:focus, .mfield textarea:focus, .mfield select:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,95,203,0.11); }
    .mfield textarea { height: 68px; }
    .mrow { display: flex; gap: 10px; }
    .mrow .mfield { flex: 1; }
    .modal-actions { display: flex; gap: 10px; margin-top: 1.2rem; }
    .btn-cancel { flex: 1; border: 1.5px solid var(--border); background: transparent; border-radius: 12px; padding: 10px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; font-family: inherit; transition: background .2s; }
    .btn-cancel:hover { background: #f5f3ff; }
    .btn-ok { flex: 2; border: none; border-radius: 12px; padding: 10px; font-size: 13px; font-weight: 700; color: #fff; cursor: pointer; font-family: inherit; background: linear-gradient(90deg,var(--purple),var(--purple2)); transition: opacity .2s, transform .1s; }
    .btn-ok:hover { opacity: .88; }
    .btn-ok:active { transform: scale(.98); }

    /* PROJECT DETAIL PANEL */
    .detail-panel {
      background: var(--white); border-radius: 24px; width: 560px; max-width: 96vw; max-height: 80vh;
      box-shadow: 0 28px 80px rgba(120,80,180,0.18);
      transform: translateY(18px) scale(.97); transition: transform .3s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .overlay.open .detail-panel { transform: none; }
    .dp-header {
      display: flex; align-items: center; gap: 14px;
      padding: 20px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .dp-icon { width: 42px; height: 42px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .dp-title { font-size: 18px; font-weight: 700; }
    .dp-count { font-size: 12px; color: var(--muted); }
    .dp-close { margin-left: auto; width: 30px; height: 30px; border-radius: 9px; border: none; background: #f3f0fa; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: background .15s, color .15s; }
    .dp-close:hover { background: #ffe0e8; color: #e04070; }
    .dp-body { flex: 1; overflow-y: auto; padding: 16px 24px 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .dp-empty { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }
    .dp-task-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 12px;
      border: 1px solid var(--border); margin-bottom: 8px;
      transition: background .15s;
    }
    .dp-task-row:hover { background: #faf8ff; }
    .dp-task-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .dp-task-name { font-size: 13px; font-weight: 500; flex: 1; }
    .dp-task-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; flex-shrink: 0; }
    .dp-task-del { width: 24px; height: 24px; border-radius: 7px; border: none; background: transparent; cursor: pointer; font-size: 12px; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: background .15s, color .15s; }
    .dp-task-del:hover { background: #ffe0e8; color: #e04070; }
    .dp-footer { padding: 12px 24px 18px; border-top: 1px solid var(--border); flex-shrink: 0; }

    @keyframes rowIn  { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
    @keyframes cardIn { from { opacity:0; transform:scale(.93); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="logo">hp-top</span>
  <div class="topbar-right">
    <div class="tb-icon">👥</div>
    <div class="tb-icon">🎧</div>
    <div class="tb-icon">💾</div>
    <div class="search-wrap">
      <span style="color:var(--muted);font-size:14px">🔍</span>
      <input type="text" placeholder="Search...">
    </div>
    <button class="btn-login" onclick="window.location.href='auth.html'">🔑 Log in</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="page-title">Projects</div>

  <!-- PROJECT CARDS -->
  <div class="projects-row" id="projectsRow">
    <div class="card-add" onclick="openCreateModal('project')" title="New project">+</div>
  </div>

  <!-- TASKS TABLE -->
  <div class="table-card">
    <div class="table-head">
      <span class="table-head-title">All Tasks</span>
      <button class="btn-new" onclick="openCreateModal('task')">+ New Task</button>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:130px">Due date</th>
          <th>Title</th>
          <th style="width:120px">Status</th>
          <th style="width:160px">Assignee</th>
          <th style="width:30px"></th>
        </tr>
      </thead>
      <tbody id="taskBody">
        <tr id="emptyRow">
          <td colspan="5" style="text-align:center;padding:40px;color:var(--muted);font-size:13px">
            No tasks yet — click <b>+ New Task</b> to add one
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- CREATE MODAL -->
<div class="overlay" id="createOverlay" onclick="overlayBgClick(event,'createOverlay')">
  <div class="modal">
    <div class="modal-title" id="mTitle">New Task</div>

    <!-- task form -->
    <div id="fTask">
      <div class="mfield">
        <label>Title *</label>
        <input type="text" id="tTitle" placeholder="What needs to be done?">
      </div>
      <div class="mfield">
        <label>Description</label>
        <textarea id="tDesc" placeholder="Optional details..."></textarea>
      </div>
      <div class="mrow">
        <div class="mfield">
          <label>Project</label>
          <select id="tProject"><option value="">— No project —</option></select>
        </div>
        <div class="mfield">
          <label>Status</label>
          <select id="tStatus">
            <option value="backlog">Backlog</option>
            <option value="progress">In Progress</option>
            <option value="review">Review</option>
            <option value="done">Done</option>
          </select>
        </div>
      </div>
      <div class="mrow">
        <div class="mfield">
          <label>Priority</label>
          <select id="tPriority">
            <option value="#e072a4">🔴 High</option>
            <option value="#e08c2a" selected>🟡 Medium</option>
            <option value="#5b8dee">🔵 Low</option>
          </select>
        </div>
        <div class="mfield">
          <label>Assignee</label>
          <input type="text" id="tAssignee" placeholder="Full name">
        </div>
      </div>
      <div class="mfield">
        <label>Due date</label>
        <input type="date" id="tDeadline">
      </div>
    </div>

    <!-- project form -->
    <div id="fProject" style="display:none">
      <div class="mfield">
        <label>Project name *</label>
        <input type="text" id="pName" placeholder="e.g. Mobile App Redesign">
      </div>
      <div class="mrow">
        <div class="mfield">
          <label>Icon</label>
          <select id="pIcon">
            <option>📱</option><option>🌐</option><option>🚀</option>
            <option>💡</option><option>🎨</option><option>⚙️</option>
          </select>
        </div>
        <div class="mfield">
          <label>Color</label>
          <select id="pColor">
            <option value="linear-gradient(135deg,#e072a4,#f09ac0)">Pink</option>
            <option value="linear-gradient(135deg,#5b8dee,#93b4f5)">Blue</option>
            <option value="linear-gradient(135deg,#7c5fcb,#a06fdd)">Purple</option>
            <option value="linear-gradient(135deg,#22c97a,#5b8dee)">Green</option>
          </select>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCreateModal()">Cancel</button>
      <button class="btn-ok" id="btnOk" onclick="handleOk()">Create Task</button>
    </div>
  </div>
</div>

<!-- PROJECT DETAIL OVERLAY -->
<div class="overlay" id="detailOverlay" onclick="overlayBgClick(event,'detailOverlay')">
  <div class="detail-panel">
    <div class="dp-header">
      <div class="dp-icon" id="dpIcon"></div>
      <div>
        <div class="dp-title" id="dpTitle"></div>
        <div class="dp-count" id="dpCount"></div>
      </div>
      <button class="dp-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="dp-body" id="dpBody"></div>
    <div class="dp-footer">
      <button class="btn-new" style="width:100%;justify-content:center" onclick="addTaskToOpenProject()">+ Add Task to this Project</button>
    </div>
  </div>
</div>

<script>
  /* ── State ── */
  let projects = [];   // { id, name, icon, color }
  let tasks    = [];   // { id, title, desc, status, priority, assignee, deadline, projectId }
  let avIdx    = 0;
  let openProjectId = null;
  let createMode = 'task';

  const GRADS = [
    'linear-gradient(135deg,#7c5fcb,#a06fdd)',
    'linear-gradient(135deg,#5b8dee,#93b4f5)',
    'linear-gradient(135deg,#e072a4,#f09ac0)',
    'linear-gradient(135deg,#22c97a,#5b8dee)',
    'linear-gradient(135deg,#e08c2a,#f0c060)',
  ];
  const STATUS = {
    backlog:  { cls:'b-backlog',  label:'Backlog',     bg:'#f0ebff', em:'📋' },
    progress: { cls:'b-progress', label:'In Progress', bg:'#ddeeff', em:'🔧' },
    review:   { cls:'b-review',   label:'Review',      bg:'#fff3dc', em:'👁' },
    done:     { cls:'b-done',     label:'Done',        bg:'#ddf7ec', em:'✅' },
  };

  /* ── Helpers ── */
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—'; }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

  /* ── Project select sync ── */
  function syncProjectSelect() {
    const sel = document.getElementById('tProject');
    sel.innerHTML = '<option value="">— No project —</option>';
    projects.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id; opt.textContent = p.icon + ' ' + p.name;
      sel.appendChild(opt);
    });
  }

  /* ── Create modal ── */
  function openCreateModal(mode, preselectedProjectId) {
    createMode = mode;
    document.getElementById('fTask').style.display    = mode === 'task'    ? '' : 'none';
    document.getElementById('fProject').style.display = mode === 'project' ? '' : 'none';
    document.getElementById('mTitle').textContent  = mode === 'task' ? 'New Task' : 'New Project';
    document.getElementById('btnOk').textContent   = mode === 'task' ? 'Create Task' : 'Create Project';
    if (mode === 'task') {
      syncProjectSelect();
      if (preselectedProjectId) document.getElementById('tProject').value = preselectedProjectId;
    }
    document.getElementById('createOverlay').classList.add('open');
    setTimeout(() => document.getElementById(mode === 'task' ? 'tTitle' : 'pName').focus(), 150);
  }

  function closeCreateModal() {
    document.getElementById('createOverlay').classList.remove('open');
    ['tTitle','tDesc','tAssignee','tDeadline','pName'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
    document.getElementById('tStatus').value = 'backlog';
    document.getElementById('tPriority').value = '#e08c2a';
  }

  function handleOk() { createMode === 'task' ? doCreateTask() : doCreateProject(); }

  /* ── Create task ── */
  function doCreateTask() {
    const title = document.getElementById('tTitle').value.trim();
    if (!title) { flash('tTitle'); return; }
    const task = {
      id:        uid(),
      title,
      desc:      document.getElementById('tDesc').value.trim(),
      status:    document.getElementById('tStatus').value,
      priority:  document.getElementById('tPriority').value,
      assignee:  document.getElementById('tAssignee').value.trim() || 'You',
      deadline:  document.getElementById('tDeadline').value,
      projectId: document.getElementById('tProject').value || null,
      grad:      GRADS[avIdx++ % GRADS.length],
    };
    tasks.push(task);
    renderTaskRow(task);
    if (task.projectId) updateProjectCount(task.projectId);
    closeCreateModal();
    // if detail panel is open for this project, refresh it
    if (openProjectId && openProjectId === task.projectId) renderDetailBody(openProjectId);
  }

  /* ── Render task row in main table ── */
  function renderTaskRow(task) {
    const emptyRow = document.getElementById('emptyRow');
    if (emptyRow) emptyRow.style.display = 'none';
    const s   = STATUS[task.status];
    const ini = task.assignee.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const proj = task.projectId ? projects.find(p=>p.id===task.projectId) : null;
    const projTag = proj ? `<span class="proj-tag">${esc(proj.icon)} ${esc(proj.name)}</span>` : '';

    const tr = document.createElement('tr');
    tr.dataset.taskId = task.id;
    tr.style.animation = 'rowIn .3s ease both';
    tr.innerHTML = `
      <td class="td-date"><span class="priority-dot" style="background:${esc(task.priority)}"></span>${esc(fmtDate(task.deadline))}</td>
      <td><div class="task-cell"><div class="task-sq" style="background:${s.bg}">${s.em}</div><span class="task-label">${esc(task.title)}</span>${projTag}</div></td>
      <td><span class="badge ${s.cls}">${s.label}</span></td>
      <td><div class="asgn-cell"><div class="asgn-av" style="background:${task.grad}">${esc(ini)}</div><span class="asgn-name">${esc(task.assignee)}</span></div></td>
      <td><button class="row-del" title="Delete" onclick="deleteTask('${task.id}')">🗑</button></td>`;
    document.getElementById('taskBody').prepend(tr);
  }

  /* ── Delete task ── */
  function deleteTask(id) {
    const tr = document.querySelector(`tr[data-task-id="${id}"]`);
    if (tr) {
      tr.style.transition = 'opacity .25s, transform .25s';
      tr.style.opacity = '0'; tr.style.transform = 'translateX(12px)';
      setTimeout(() => {
        tr.remove();
        if (!document.querySelector('#taskBody tr:not(#emptyRow)')) {
          document.getElementById('emptyRow').style.display = '';
        }
      }, 260);
    }
    const task = tasks.find(t=>t.id===id);
    const projId = task?.projectId;
    tasks = tasks.filter(t=>t.id!==id);
    if (projId) updateProjectCount(projId);
    if (openProjectId === projId) renderDetailBody(projId);
  }

  /* ── Create project ── */
  function doCreateProject() {
    const name = document.getElementById('pName').value.trim();
    if (!name) { flash('pName'); return; }
    const proj = {
      id:    uid(),
      name,
      icon:  document.getElementById('pIcon').value,
      color: document.getElementById('pColor').value,
    };
    projects.push(proj);
    renderProjectCard(proj);
    closeCreateModal();
  }

  /* ── Render project card ── */
  function renderProjectCard(proj) {
    const addBtn = document.querySelector('.card-add');
    const card = document.createElement('div');
    card.className = 'project-card';
    card.dataset.projectId = proj.id;
    card.style.animation = 'cardIn .35s cubic-bezier(.4,0,.2,1) both';
    card.innerHTML = `
      <div class="proj-icon" style="background:${proj.color}">${proj.icon}</div>
      <button class="proj-del" title="Delete project" onclick="deleteProject('${proj.id}',event)">🗑</button>
      <div class="proj-avatars"><div class="pav" style="background:var(--purple)">Y</div></div>
      <div class="proj-name">${esc(proj.name)}</div>
      <div class="proj-count" id="pc-${proj.id}">0 Tasks</div>`;
    card.addEventListener('click', () => openDetail(proj.id));
    document.getElementById('projectsRow').insertBefore(card, addBtn);
  }

  /* ── Delete project ── */
  function deleteProject(id, e) {
    e.stopPropagation();
    const card = document.querySelector(`.project-card[data-project-id="${id}"]`);
    if (card) {
      card.style.transition = 'opacity .25s, transform .25s';
      card.style.opacity = '0'; card.style.transform = 'scale(.92)';
      setTimeout(() => card.remove(), 260);
    }
    // unlink tasks from this project (keep tasks, just remove project link)
    tasks.forEach(t => { if (t.projectId === id) t.projectId = null; });
    projects = projects.filter(p=>p.id!==id);
    // re-render all task rows to remove project tags
    rebuildTable();
    if (openProjectId === id) closeDetail();
  }

  /* ── Rebuild task table ── */
  function rebuildTable() {
    const tbody = document.getElementById('taskBody');
    tbody.innerHTML = `<tr id="emptyRow"><td colspan="5" style="text-align:center;padding:40px;color:var(--muted);font-size:13px">No tasks yet — click <b>+ New Task</b> to add one</td></tr>`;
    if (tasks.length === 0) return;
    document.getElementById('emptyRow').style.display = 'none';
    [...tasks].reverse().forEach(t => renderTaskRow(t));
  }

  /* ── Update project task count ── */
  function updateProjectCount(projId) {
    const count = tasks.filter(t=>t.projectId===projId).length;
    const el = document.getElementById(`pc-${projId}`);
    if (el) el.textContent = count + (count===1?' Task':' Tasks');
  }

  /* ── Project detail ── */
  function openDetail(projId) {
    openProjectId = projId;
    const proj = projects.find(p=>p.id===projId);
    if (!proj) return;
    document.getElementById('dpIcon').style.background = proj.color;
    document.getElementById('dpIcon').textContent = proj.icon;
    document.getElementById('dpTitle').textContent = proj.name;
    renderDetailBody(projId);
    document.getElementById('detailOverlay').classList.add('open');
  }

  function closeDetail() {
    openProjectId = null;
    document.getElementById('detailOverlay').classList.remove('open');
  }

  function renderDetailBody(projId) {
    const projTasks = tasks.filter(t=>t.projectId===projId);
    const countEl = document.getElementById('dpCount');
    countEl.textContent = projTasks.length + (projTasks.length===1?' task':' tasks');
    const body = document.getElementById('dpBody');
    if (projTasks.length === 0) {
      body.innerHTML = '<div class="dp-empty">No tasks in this project yet.<br>Click <b>Add Task</b> below to get started.</div>';
      return;
    }
    body.innerHTML = projTasks.map(t => {
      const s = STATUS[t.status];
      return `<div class="dp-task-row">
        <div class="dp-task-icon" style="background:${s.bg}">${s.em}</div>
        <span class="dp-task-name">${esc(t.title)}</span>
        <span class="badge ${s.cls}" style="margin-right:6px">${s.label}</span>
        <span class="dp-task-date">${fmtDate(t.deadline)}</span>
        <button class="dp-task-del" onclick="deleteTask('${t.id}')">🗑</button>
      </div>`;
    }).join('');
  }

  function addTaskToOpenProject() {
    closeDetail();
    setTimeout(() => openCreateModal('task', openProjectId), 200);
  }

  /* ── Overlay click outside ── */
  function overlayBgClick(e, id) {
    if (e.target.id === id) {
      if (id === 'createOverlay') closeCreateModal();
      if (id === 'detailOverlay') closeDetail();
    }
  }

  function flash(id) {
    const el = document.getElementById(id);
    el.style.borderColor = '#e04070'; el.focus();
    setTimeout(()=> el.style.borderColor = '', 1200);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeCreateModal(); closeDetail(); }
  });
</script>
</body>
</html>
