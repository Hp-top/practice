<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hp-top — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Все стили из оригинального dashboard.html оставляем без изменений.
       Ниже приведён только JS-код, стили идентичны предыдущей версии.
       Для краткости я скопирую стили из исходника – они остаются теми же. */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2fa; --white: #ffffff;
      --purple: #7c5fcb; --purple2: #a06fdd;
      --pink: #e072a4; --pink2: #f09ac0;
      --blue: #5b8dee; --blue2: #93b4f5;
      --text: #1e1535; --muted: #9b94ae; --border: #e8e3f5;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 58px; background: var(--white); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 50; }
    .logo { font-size: 20px; font-weight: 800; background: linear-gradient(90deg,var(--purple),var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.5px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .tb-icon { width: 34px; height: 34px; border-radius: 10px; background: #f5f3ff; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); transition: box-shadow .15s, color .15s; }
    .tb-icon:hover { box-shadow: 0 2px 10px rgba(120,80,180,0.13); color: var(--purple); }
    .search-wrap { display: flex; align-items: center; gap: 7px; background: #f5f3ff; border: 1px solid var(--border); border-radius: 10px; padding: 7px 13px; width: 180px; transition: box-shadow .15s, border-color .15s; }
    .search-wrap:focus-within { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,95,203,0.1); }
    .search-wrap input { border: none; outline: none; background: transparent; font-size: 12px; font-family: inherit; color: var(--text); width: 100%; }
    .btn-login { display: flex; align-items: center; gap: 7px; background: linear-gradient(90deg,var(--purple),var(--purple2)); color: #fff; border: none; border-radius: 50px; padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .2s, transform .1s, box-shadow .2s; box-shadow: 0 4px 14px rgba(124,95,203,0.25); }
    .btn-login:hover { opacity: .9; }
    .main { flex: 1; overflow-y: auto; padding: 28px; scrollbar-width: thin; }
    .page-title { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 22px; }
    .projects-row { display: flex; gap: 16px; margin-bottom: 30px; flex-wrap: wrap; align-items: flex-end; }
    .project-card { background: var(--white); border-radius: 20px; padding: 52px 20px 18px; width: 195px; border: 1px solid var(--border); box-shadow: 0 2px 14px rgba(120,80,180,0.07); position: relative; cursor: pointer; transition: transform .2s, box-shadow .2s; display: flex; flex-direction: column; justify-content: flex-end; margin-top: 20px; }
    .project-card:hover { transform: translateY(-4px); box-shadow: 0 10px 32px rgba(120,80,180,0.14); }
    .proj-icon { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 6px 18px rgba(0,0,0,0.14); }
    .proj-del { position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; border-radius: 7px; border: none; background: transparent; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; color: var(--muted); z-index: 2; }
    .proj-del:hover { background: #ffe0e8; color: #e04070; }
    .proj-avatars { display: flex; margin-bottom: 10px; }
    .pav { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--white); margin-right: -6px; font-size: 9px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; }
    .proj-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .proj-count { font-size: 11px; color: var(--muted); }
    .card-add { width: 130px; min-height: 130px; margin-top: 20px; border: 2px dashed var(--border); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--muted); cursor: pointer; transition: border-color .2s, color .2s, background .2s; }
    .card-add:hover { border-color: var(--purple); color: var(--purple); background: #f7f4ff; }
    .table-card { background: var(--white); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
    .table-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px 14px; border-bottom: 1px solid var(--border); }
    .table-head-title { font-size: 14px; font-weight: 600; }
    .btn-new { display: flex; align-items: center; gap: 6px; background: linear-gradient(90deg,var(--purple),var(--purple2)); color: #fff; border: none; border-radius: 10px; padding: 7px 15px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .2s, transform .1s; }
    .btn-new:hover { opacity: .88; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; padding: 10px 22px; background: #faf9ff; border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid #f3f0fa; transition: background .15s; }
    tbody tr:hover { background: #faf8ff; }
    tbody td { padding: 12px 22px; font-size: 13px; vertical-align: middle; }
    .td-date { color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; white-space: nowrap; }
    .priority-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 7px; vertical-align: middle; }
    .task-cell { display: flex; align-items: center; gap: 10px; }
    .task-sq { width: 27px; height: 27px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .task-label { font-size: 13px; font-weight: 500; }
    .proj-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: #f0ebff; color: var(--purple); margin-left: 8px; }
    .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 6px; letter-spacing: .05em; text-transform: uppercase; }
    .b-backlog  { background: #f0ebff; color: var(--purple); }
    .b-progress { background: #ddeeff; color: #2e7de9; }
    .b-review   { background: #fff3dc; color: #c97a00; }
    .b-done     { background: #ddf7ec; color: #1a9e60; }
    .asgn-cell { display: flex; align-items: center; gap: 8px; }
    .asgn-av { width: 27px; height: 27px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .row-del { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 13px; border: none; background: transparent; }
    .row-del:hover { background: #ffe0e8; color: #e04070; }
    .overlay { position: fixed; inset: 0; background: rgba(30,21,53,0.28); backdrop-filter: blur(5px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--white); border-radius: 24px; padding: 2rem; width: 460px; max-width: 95vw; box-shadow: 0 28px 80px rgba(120,80,180,0.18); transform: translateY(18px) scale(.97); transition: transform .3s cubic-bezier(.4,0,.2,1); }
    .overlay.open .modal { transform: none; }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 1.2rem; background: linear-gradient(90deg,var(--purple),var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .mfield { margin-bottom: .9rem; }
    .mfield label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing: .04em; text-transform: uppercase; }
    .mfield input, .mfield textarea, .mfield select { width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 9px 13px; font-size: 13px; font-family: inherit; color: var(--text); background: #fdfbff; outline: none; }
    .mfield input:focus, .mfield textarea:focus, .mfield select:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,95,203,0.11); }
    .mrow { display: flex; gap: 10px; }
    .mrow .mfield { flex: 1; }
    .modal-actions { display: flex; gap: 10px; margin-top: 1.2rem; }
    .btn-cancel { flex: 1; border: 1.5px solid var(--border); background: transparent; border-radius: 12px; padding: 10px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; }
    .btn-cancel:hover { background: #f5f3ff; }
    .btn-ok { flex: 2; border: none; border-radius: 12px; padding: 10px; font-size: 13px; font-weight: 700; color: #fff; cursor: pointer; background: linear-gradient(90deg,var(--purple),var(--purple2)); }
    .detail-panel { background: var(--white); border-radius: 24px; width: 560px; max-width: 96vw; max-height: 80vh; box-shadow: 0 28px 80px rgba(120,80,180,0.18); transform: translateY(18px) scale(.97); transition: transform .3s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; overflow: hidden; }
    .overlay.open .detail-panel { transform: none; }
    .dp-header { display: flex; align-items: center; gap: 14px; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .dp-icon { width: 42px; height: 42px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .dp-title { font-size: 18px; font-weight: 700; }
    .dp-count { font-size: 12px; color: var(--muted); }
    .dp-close { margin-left: auto; width: 30px; height: 30px; border-radius: 9px; border: none; background: #f3f0fa; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--muted); }
    .dp-close:hover { background: #ffe0e8; color: #e04070; }
    .dp-body { flex: 1; overflow-y: auto; padding: 16px 24px 20px; }
    .dp-empty { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }
    .dp-task-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; }
    .dp-task-row:hover { background: #faf8ff; }
    .dp-task-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .dp-task-name { font-size: 13px; font-weight: 500; flex: 1; }
    .dp-task-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; flex-shrink: 0; }
    .dp-task-del { width: 24px; height: 24px; border-radius: 7px; border: none; background: transparent; cursor: pointer; font-size: 12px; color: var(--muted); display: flex; align-items: center; justify-content: center; }
    .dp-task-del:hover { background: #ffe0e8; color: #e04070; }
    .dp-footer { padding: 12px 24px 18px; border-top: 1px solid var(--border); flex-shrink: 0; }
    @keyframes rowIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
    @keyframes cardIn { from { opacity:0; transform:scale(.93); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>
<div class="topbar">
  <span class="logo">hp-top</span>
  <div class="topbar-right">
    <div class="search-wrap">
      <span style="color:var(--muted);font-size:14px">🔍</span>
      <input type="text" id="searchInput" placeholder="Search...">
    </div>
    <button class="btn-login" id="authBtn">🔑 Log in</button>
  </div>
</div>
<div class="main">
  <div class="page-title">Projects</div>
  <div class="projects-row" id="projectsRow">
    <div class="card-add" id="addProjectBtn" title="New project">+</div>
  </div>
  <div class="table-card">
    <div class="table-head">
      <span class="table-head-title">All Tasks</span>
      <button class="btn-new" id="addTaskBtn">+ New Task</button>
    </div>
    <table>
      <thead><tr><th style="width:130px">Due date</th><th>Title</th><th style="width:120px">Status</th><th style="width:160px">Assignee</th><th style="width:30px"></th></tr></thead>
      <tbody id="taskBody"><tr id="emptyRow"><td colspan="5" style="text-align:center;padding:40px;">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- CREATE MODAL -->
<div class="overlay" id="createOverlay" onclick="overlayBgClick(event,'createOverlay')">
  <div class="modal">
    <div class="modal-title" id="mTitle">New Task</div>
    <div id="fTask">
      <div class="mfield"><label>Title *</label><input type="text" id="tTitle"></div>
      <div class="mfield"><label>Description</label><textarea id="tDesc"></textarea></div>
      <div class="mrow">
        <div class="mfield"><label>Project</label><select id="tProject"><option value="">— No project —</option></select></div>
        <div class="mfield"><label>Status</label><select id="tStatus"><option value="backlog">Backlog</option><option value="progress">In Progress</option><option value="review">Review</option><option value="done">Done</option></select></div>
      </div>
      <div class="mrow">
        <div class="mfield"><label>Priority</label><select id="tPriority"><option value="#e072a4">🔴 High</option><option value="#e08c2a" selected>🟡 Medium</option><option value="#5b8dee">🔵 Low</option></select></div>
        <div class="mfield"><label>Assignee</label><input type="text" id="tAssignee" placeholder="Full name"></div>
      </div>
      <div class="mfield"><label>Due date</label><input type="date" id="tDeadline"></div>
    </div>
    <div id="fProject" style="display:none">
      <div class="mfield"><label>Project name *</label><input type="text" id="pName"></div>
      <div class="mrow">
        <div class="mfield"><label>Icon</label><select id="pIcon"><option>📱</option><option>🌐</option><option>🚀</option><option>💡</option><option>🎨</option><option>⚙️</option></select></div>
        <div class="mfield"><label>Color</label><select id="pColor"><option value="linear-gradient(135deg,#e072a4,#f09ac0)">Pink</option><option value="linear-gradient(135deg,#5b8dee,#93b4f5)">Blue</option><option value="linear-gradient(135deg,#7c5fcb,#a06fdd)">Purple</option><option value="linear-gradient(135deg,#22c97a,#5b8dee)">Green</option></select></div>
      </div>
    </div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeCreateModal()">Cancel</button><button class="btn-ok" id="btnOk">Create</button></div>
  </div>
</div>
<!-- DETAIL OVERLAY -->
<div class="overlay" id="detailOverlay" onclick="overlayBgClick(event,'detailOverlay')">
  <div class="detail-panel">
    <div class="dp-header"><div class="dp-icon" id="dpIcon"></div><div><div class="dp-title" id="dpTitle"></div><div class="dp-count" id="dpCount"></div></div><button class="dp-close" onclick="closeDetail()">✕</button></div>
    <div class="dp-body" id="dpBody"></div>
    <div class="dp-footer"><button class="btn-new" id="addTaskToProjectBtn" style="width:100%;justify-content:center">+ Add Task to this Project</button></div>
  </div>
</div>

<script>
  const API_BASE = 'http://localhost:8000';
  let token = localStorage.getItem('hp_token');
  let projects = [];
  let tasks = [];

  // ---------- Helper ----------
  function getHeaders() {
    return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
  }

  async function apiCall(url, opts = {}) {
    const res = await fetch(`${API_BASE}${url}`, { ...opts, headers: getHeaders() });
    if (res.status === 401) {
      localStorage.removeItem('hp_token');
      window.location.href = 'auth.html';
      throw new Error('Unauthorized');
    }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'Request failed');
    }
    return res.status === 204 ? null : await res.json();
  }

  function formatDate(iso) { return iso ? new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—'; }

  // ---------- Load Data ----------
  async function loadProjects() {
    projects = await apiCall('/projects');
    const taskCounts = await Promise.all(projects.map(p => apiCall(`/projects/${p.id}`).catch(() => ({ task_count: 0 }))));
    projects.forEach((p, i) => p.task_count = taskCounts[i].task_count);
    renderProjects();
  }

  async function loadTasks() {
    tasks = await apiCall('/tasks');
    renderTasks();
  }

  async function loadAll() { await loadProjects(); await loadTasks(); }

  // ---------- Render Projects ----------
  function renderProjects() {
    const row = document.getElementById('projectsRow');
    const addBtn = document.querySelector('.card-add');
    const oldCards = row.querySelectorAll('.project-card');
    oldCards.forEach(c => c.remove());
    projects.forEach(p => {
      const card = document.createElement('div');
      card.className = 'project-card';
      card.dataset.projectId = p.id;
      card.style.animation = 'cardIn .35s cubic-bezier(.4,0,.2,1) both';
      card.innerHTML = `
        <div class="proj-icon" style="background:${p.color}">${p.icon}</div>
        <button class="proj-del" title="Delete project" onclick="deleteProject(${p.id}, event)">🗑</button>
        <div class="proj-avatars"><div class="pav" style="background:var(--purple)">${p.owner_id ? 'U' : 'Y'}</div></div>
        <div class="proj-name">${escapeHtml(p.name)}</div>
        <div class="proj-count">${p.task_count} Tasks</div>`;
      card.addEventListener('click', () => openDetail(p.id));
      row.insertBefore(card, addBtn);
    });
  }

  // ---------- Render Tasks ----------
  function renderTasks(filter = '') {
    const tbody = document.getElementById('taskBody');
    tbody.innerHTML = '';
    let filtered = tasks;
    if (filter) filtered = tasks.filter(t => t.title.toLowerCase().includes(filter.toLowerCase()) || (t.assignee && t.assignee.toLowerCase().includes(filter.toLowerCase())));
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted)">No tasks found</td></tr>';
      return;
    }
    filtered.forEach(task => {
      const s = getStatusMeta(task.status);
      const ini = task.assignee.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      const proj = projects.find(p => p.id === task.project_id);
      const projTag = proj ? `<span class="proj-tag">${escapeHtml(proj.icon)} ${escapeHtml(proj.name)}</span>` : '';
      const tr = document.createElement('tr');
      tr.dataset.taskId = task.id;
      tr.style.animation = 'rowIn .3s ease both';
      tr.innerHTML = `
        <td class="td-date"><span class="priority-dot" style="background:${task.priority}"></span>${formatDate(task.deadline)}</td>
        <td><div class="task-cell"><div class="task-sq" style="background:${s.bg}">${s.em}</div><span class="task-label">${escapeHtml(task.title)}</span>${projTag}</div></td>
        <td><span class="badge ${s.cls}">${s.label}</span></td>
        <td><div class="asgn-cell"><div class="asgn-av" style="background:${task.grad || '#7c5fcb'}">${escapeHtml(ini)}</div><span class="asgn-name">${escapeHtml(task.assignee)}</span></div></td>
        <td><button class="row-del" onclick="deleteTask(${task.id})">🗑</button></td>`;
      tbody.appendChild(tr);
    });
  }

  function getStatusMeta(status) {
    const map = {
      backlog:  { cls:'b-backlog', label:'Backlog', bg:'#f0ebff', em:'📋' },
      progress: { cls:'b-progress', label:'In Progress', bg:'#ddeeff', em:'🔧' },
      review:   { cls:'b-review', label:'Review', bg:'#fff3dc', em:'👁' },
      done:     { cls:'b-done', label:'Done', bg:'#ddf7ec', em:'✅' }
    };
    return map[status] || map.backlog;
  }

  // ---------- CRUD ----------
  async function createProject(name, icon, color) {
    await apiCall('/projects', { method: 'POST', body: JSON.stringify({ name, icon, color }) });
    await loadAll();
  }

  async function deleteProject(id, event) {
    event.stopPropagation();
    if (!confirm('Delete project? All tasks will be unlinked.')) return;
    await apiCall(`/projects/${id}`, { method: 'DELETE' });
    await loadAll();
    closeDetail();
  }

  async function createTask(taskData) {
    await apiCall('/tasks', { method: 'POST', body: JSON.stringify(taskData) });
    await loadAll();
  }

  async function deleteTask(id) {
    if (!confirm('Delete task?')) return;
    await apiCall(`/tasks/${id}`, { method: 'DELETE' });
    await loadAll();
    if (openProjectId) renderDetailBody(openProjectId);
  }

  // ---------- Detail Panel ----------
  let openProjectId = null;
  function openDetail(projId) {
    openProjectId = projId;
    const proj = projects.find(p => p.id === projId);
    if (!proj) return;
    document.getElementById('dpIcon').style.background = proj.color;
    document.getElementById('dpIcon').textContent = proj.icon;
    document.getElementById('dpTitle').textContent = proj.name;
    renderDetailBody(projId);
    document.getElementById('detailOverlay').classList.add('open');
  }
  function closeDetail() { openProjectId = null; document.getElementById('detailOverlay').classList.remove('open'); }
  function renderDetailBody(projId) {
    const projTasks = tasks.filter(t => t.project_id === projId);
    document.getElementById('dpCount').textContent = `${projTasks.length} task${projTasks.length !== 1 ? 's' : ''}`;
    const body = document.getElementById('dpBody');
    if (projTasks.length === 0) { body.innerHTML = '<div class="dp-empty">No tasks in this project yet.<br>Click <b>Add Task</b> below to get started.</div>'; return; }
    body.innerHTML = projTasks.map(t => {
      const s = getStatusMeta(t.status);
      return `<div class="dp-task-row">
        <div class="dp-task-icon" style="background:${s.bg}">${s.em}</div>
        <span class="dp-task-name">${escapeHtml(t.title)}</span>
        <span class="badge ${s.cls}" style="margin-right:6px">${s.label}</span>
        <span class="dp-task-date">${formatDate(t.deadline)}</span>
        <button class="dp-task-del" onclick="deleteTask(${t.id})">🗑</button>
      </div>`;
    }).join('');
  }
  function addTaskToOpenProject() {
    closeDetail();
    setTimeout(() => openCreateModal('task', openProjectId), 200);
  }

  // ---------- Modal Logic ----------
  let createMode = 'task';
  let preselectedProjectId = null;

  function openCreateModal(mode, projectId = null) {
    createMode = mode;
    preselectedProjectId = projectId;
    document.getElementById('fTask').style.display = mode === 'task' ? '' : 'none';
    document.getElementById('fProject').style.display = mode === 'project' ? '' : 'none';
    document.getElementById('mTitle').textContent = mode === 'task' ? 'New Task' : 'New Project';
    document.getElementById('btnOk').textContent = mode === 'task' ? 'Create Task' : 'Create Project';
    if (mode === 'task') {
      const sel = document.getElementById('tProject');
      sel.innerHTML = '<option value="">— No project —</option>' + projects.map(p => `<option value="${p.id}" ${projectId && p.id == projectId ? 'selected' : ''}>${escapeHtml(p.icon)} ${escapeHtml(p.name)}</option>`).join('');
    }
    document.getElementById('createOverlay').classList.add('open');
  }
  function closeCreateModal() {
    document.getElementById('createOverlay').classList.remove('open');
    document.getElementById('tTitle').value = '';
    document.getElementById('tDesc').value = '';
    document.getElementById('tAssignee').value = '';
    document.getElementById('tDeadline').value = '';
    document.getElementById('pName').value = '';
    document.getElementById('tStatus').value = 'backlog';
    document.getElementById('tPriority').value = '#e08c2a';
  }
  async function handleOk() {
    if (createMode === 'task') {
      const title = document.getElementById('tTitle').value.trim();
      if (!title) { alert('Title required'); return; }
      const task = {
        title,
        description: document.getElementById('tDesc').value.trim(),
        status: document.getElementById('tStatus').value,
        priority: document.getElementById('tPriority').value,
        assignee: document.getElementById('tAssignee').value.trim() || 'You',
        deadline: document.getElementById('tDeadline').value || null,
        project_id: parseInt(document.getElementById('tProject').value) || null
      };
      await createTask(task);
    } else {
      const name = document.getElementById('pName').value.trim();
      if (!name) { alert('Project name required'); return; }
      await createProject(name, document.getElementById('pIcon').value, document.getElementById('pColor').value);
    }
    closeCreateModal();
  }

  // ---------- Search & Auth ----------
  function initSearch() {
    document.getElementById('searchInput').addEventListener('input', e => renderTasks(e.target.value));
  }
  function initAuthButton() {
    const btn = document.getElementById('authBtn');
    if (token) {
      btn.textContent = '🚪 Log out';
      btn.onclick = () => { localStorage.removeItem('hp_token'); window.location.href = 'auth.html'; };
    } else {
      btn.textContent = '🔑 Log in';
      btn.onclick = () => window.location.href = 'auth.html';
    }
  }

  function escapeHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function overlayBgClick(e, id) { if (e.target.id === id) { if (id === 'createOverlay') closeCreateModal(); if (id === 'detailOverlay') closeDetail(); } }

  // ---------- Startup ----------
  window.addEventListener('load', async () => {
    if (!token) { window.location.href = 'auth.html'; return; }
    initAuthButton();
    initSearch();
    document.getElementById('addProjectBtn').onclick = () => openCreateModal('project');
    document.getElementById('addTaskBtn').onclick = () => openCreateModal('task');
    document.getElementById('addTaskToProjectBtn').onclick = addTaskToOpenProject;
    document.getElementById('btnOk').onclick = handleOk;
    try {
      await loadAll();
    } catch (err) { console.error(err); }
  });
</script>
</body>
</html>
